name: Update Ad Rules

on:
  schedule:
    # 每 4 小时执行一次（UTC 时间 0:00, 4:00, 8:00, 12:00, 16:00, 20:00）
    # 北京时间 = UTC + 8，对应北京时间 8:00, 12:00, 16:00, 20:00, 0:00, 4:00
    - cron: '0 */4 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  update-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          npm install -g yaml-js
      
      - name: Download rule files
        run: |
          # 创建规则目录
          mkdir -p data/rule_providers
          
          # 下载秋风广告规则
          echo "Downloading AWAvenue-Ads-Rule..."
          curl -sL "https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash-Classical.yaml" \
            -o data/rule_providers/AWAvenue-Ads-Rule-Clash.yaml || echo "Failed to download AWAvenue"
          
          # 下载 DD-AD 规则
          echo "Downloading DD-AD..."
          curl -sL "https://ghproxy.net/https://raw.githubusercontent.com/afwfv/DD-AD/refs/heads/release/clash.yaml" \
            -o data/rule_providers/DD-AD.yaml || echo "Failed to download DD-AD"
          
          # 下载 217heidai 规则
          echo "Downloading 217heidai..."
          curl -sL "https://gcore.jsdelivr.net/gh/217heidai/adblockfilters@main/rules/adblockmihomo.yaml" \
            -o data/rule_providers/217heidai-adblock.yaml || echo "Failed to download 217heidai"
          
          # 检查下载结果
          ls -lh data/rule_providers/
      
      - name: Validate YAML files
        run: |
          echo "Validating YAML files..."
          for file in data/rule_providers/*.yaml; do
            if [ -f "$file" ]; then
              echo "Checking $file..."
              python3 -c "import yaml; yaml.safe_load(open('$file'))" && echo "✓ $file is valid" || echo "✗ $file is invalid"
            fi
          done
      
      - name: Generate combined config
        run: |
          # 生成最终配置文件（如果需要根据规则内容动态调整，可以在此添加脚本）
          echo "Configuration file is ready at data/config.yaml"
      
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: auto-update ad rules - $(date "+%Y-%m-%d %H:%M:%S")'
          file_pattern: 'data/'
          branch: main
          commit_options: '--signoff'
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clash-config
          path: data/
          retention-days: 7
